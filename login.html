<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Чистый Град</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #004d40 0%, #00695c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .login-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .login-card h1 {
            color: #004d40;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00695c;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00695c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #004d40;
        }

        .error-message {
            background: #fee2e2;
            color: #e74c3c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .demo-info {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #999;
        }

        .demo-info strong {
            color: #00695c;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00695c;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">🧹</div>
            <h1>Чистый Град</h1>
            <p>Вход в систему</p>

            <div id="errorMsg" style="display: none;" class="error-message">
                ⚠️ Неверный логин или пароль
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Логин</label>
                    <input type="text" id="loginInput" placeholder="Введите логин" required autofocus>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="passwordInput" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="login-btn">Войти</button>
            </form>

            <div class="demo-info">
                <strong>📝 Демо-доступ:</strong><br>
                Логин: <strong>admin</strong><br>
                Пароль: <strong>admin123</strong>
            </div>
            
            <a href="services.html" class="back-link">← Вернуться на сайт</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const login = document.getElementById('loginInput').value;
            const password = document.getElementById('passwordInput').value;
            
            if (login === 'admin' && password === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', login);
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
